# ============================================================
# streaming_pipeline — Jaya Kotagiri
# Central configuration file
# All values can be overridden via environment variables
# prefixed with JAYA_STREAM_ (e.g. JAYA_STREAM_WATCH_DIR)
# ============================================================

watcher:
  watch_dir: ./sample_data          # directory to monitor for file changes
  snapshot_dir: ./snapshots         # persisted baselines for diff resumption
  debounce_ms: 300                  # delay before processing a save event
  file_extensions:                  # only watch these file types
    - .csv
    - .txt
    - .json

kafka:
  bootstrap_servers: localhost:9092
  topic: jaya_file_change_events
  producer_acks: all                # wait for full ISR acknowledgement
  retries: 5
  retry_backoff_ms: 500
  dlq_path: ./logs/dlq.jsonl       # dead-letter queue for failed publishes
  dlq_retry_interval_sec: 60       # how often to retry DLQ entries

consumer:
  group_id: jaya_stream_consumer_group
  auto_offset_reset: earliest
  enable_auto_commit: false         # manual offset commit after DB write
  poll_timeout_ms: 1000

spark:
  app_name: JayaFileChangeStream
  checkpoint_dir: ./checkpoints
  trigger_interval: 10 seconds
  max_offsets_per_trigger: 1000

db:
  target: postgres                  # options: postgres | snowflake

postgres:
  host: localhost
  port: 5432
  database: jaya_pipeline_dev
  user: jaya
  password: ""                      # set via JAYA_STREAM_POSTGRES_PASSWORD
  table: file_change_events
  pool_size: 5

snowflake:
  account: ""                       # set via JAYA_STREAM_SF_ACCOUNT
  user: ""                          # set via JAYA_STREAM_SF_USER
  password: ""                      # set via JAYA_STREAM_SF_PASSWORD
  warehouse: COMPUTE_WH
  database: JAYA_PIPELINE_PROD
  schema: FILE_EVENTS
  table: FILE_CHANGE_EVENTS
  role: SYSADMIN

logging:
  level: INFO
  log_dir: ./logs
  log_file: jaya_pipeline.log
  max_bytes: 10485760               # 10 MB per log file
  backup_count: 5
